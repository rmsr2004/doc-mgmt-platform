name: ci

on:
    workflow_call:

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAMESPACE: ${{ github.repository_owner }}
    WEB_IMAGE_NAME: secure-doc-platform-web
    DB_IMAGE_NAME: secure-doc-platform-db

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Start application stack for validation
              run: |
                  docker compose up -d --build

            - name: Wait for application
              run: |
                  timeout=60
                  elapsed=0

                  until curl -fsk https://localhost:443/health > /dev/null; do
                    if [ "$elapsed" -ge "$timeout" ]; then
                      echo "Application did not become ready within ${timeout}s"
                      exit 1
                    fi

                    echo "Waiting for application..."
                    sleep 2
                    elapsed=$((elapsed+2))
                  done

                  HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/health)
                  if [ "$HTTP_STATUS" != "301" ] && [ "$HTTP_STATUS" != "308" ]; then
                    echo "Expected HTTP redirect, got ${HTTP_STATUS}"
                    exit 1
                  fi

                  echo "Application is ready"

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Install test dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install pytest requests

            - name: Run smoke tests
              run: |
                  pytest -q tests/test_smoke.py

            - name: Stop stack
              if: always()
              run: |
                  docker compose down -v --remove-orphans

    sca:
        name: Software Composition Analysis
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.10"

            - name: Install dependencies and pip-audit
              run: |
                  pip install -r web/requirements.txt
                  pip install pip-audit

            - name: Run pip-audit
              run: |
                  pip-audit -r web/requirements.txt
    
    sast-bandit:
        name: SAST with Bandit
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.10"

            - name: Install Bandit
              run: |
                  python -m pip install --upgrade pip
                  pip install bandit

            - name: Run Bandit
              run: |
                  bandit -r . -x tests

    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set lowercase image namespace
              run: |
                  echo "IMAGE_NAMESPACE_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set image tags
              run: |
                  echo "WEB_SHA_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"
                  echo "DB_SHA_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.DB_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build and push web image
              uses: docker/build-push-action@v7
              with:
                  context: ./web
                  push: true
                  tags: ${{ env.WEB_SHA_TAG }}
                  provenance: false

            - name: Build and push db image
              uses: docker/build-push-action@v7
              with:
                  context: ./db
                  push: true
                  tags: ${{ env.DB_SHA_TAG }}
                  provenance: false

