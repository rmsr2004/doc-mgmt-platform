name: 2 - Continuous Delivery
run-name: "${{ github.workflow }}"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Immutable image tag to validate (e.g., commit SHA)"
        required: true
  workflow_run:
    workflows: ["1 - Continuous Integration"]
    types:
      - completed

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  WEB_IMAGE_NAME: secure-doc-platform-web
  DB_IMAGE_NAME: secure-doc-platform-db

jobs:
  deliver:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase image namespace
        run: |
          echo "IMAGE_NAMESPACE_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Resolve image tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export deployment image references
        run: |
          echo "WEB_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.WEB_IMAGE_NAME }}:${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "DB_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.DB_IMAGE_NAME }}:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Pull deliverable images
        run: |
          docker pull "$WEB_IMAGE"
          docker pull "$DB_IMAGE"

      - name: Start delivery environment
        env:
          WEB_IMAGE: ${{ env.WEB_IMAGE }}
          DB_IMAGE: ${{ env.DB_IMAGE }}
        run: |
          docker compose -f docker-compose.deploy.yml up -d

      - name: Wait for application
        run: |
          timeout=60
          elapsed=0

          until curl -fs http://localhost:8000/health > /dev/null; do
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "Application did not become ready within ${timeout}s"
              exit 1
            fi

            echo "Waiting for application..."
            sleep 2
            elapsed=$((elapsed+2))
          done

          echo "Application is ready"

      - name: Verify application health
        run: |
          curl -f http://localhost:8000/health

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run delivery authentication flow test
        env:
          APP_BASE_URL: http://localhost:8000
        run: |
          pytest -q tests/test_delivery_auth_flow.py

      - name: Promote validated images to dev
        if: success()
        run: |
          docker tag "$WEB_IMAGE" "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.WEB_IMAGE_NAME }}:dev"
          docker tag "$DB_IMAGE" "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.DB_IMAGE_NAME }}:dev"

          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.WEB_IMAGE_NAME }}:dev"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.DB_IMAGE_NAME }}:dev"

      - name: Show container logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.deploy.yml logs

      - name: Stop delivery environment
        if: always()
        run: |
          docker compose -f docker-compose.deploy.yml down -v --remove-orphans