name: 3 - Continuous Deployment
run-name: "${{ github.workflow }}"

on:
    workflow_call:
        inputs:
            image_tag:
                description: "Image tag to deploy"
                required: true
                type: string

    workflow_dispatch:
        inputs:
            image_tag:
                description: "Image tag to deploy (e.g., dev or a specific commit SHA)"
                required: true

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAMESPACE: ${{ github.repository_owner }}
    WEB_IMAGE_NAME: secure-doc-platform-web
    DB_IMAGE_NAME: secure-doc-platform-db

jobs:
    deploy:
        runs-on: self-hosted

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set lowercase image namespace
              env:
                  REPO_OWNER: ${{ github.repository_owner }}
              run: |
                  echo "IMAGE_NAMESPACE_LC=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

            - name: Resolve deployment images
              env:
                  INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
              run: |
                  echo "WEB_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.WEB_IMAGE_NAME }}:$INPUT_IMAGE_TAG" >> "$GITHUB_ENV"
                  echo "DB_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.DB_IMAGE_NAME }}:$INPUT_IMAGE_TAG" >> "$GITHUB_ENV"

            - name: Show deployment target
              run: |
                  echo "Deploying WEB_IMAGE=$WEB_IMAGE"
                  echo "Deploying DB_IMAGE=$DB_IMAGE"
            - name: Show deployment target
              run: |
                  echo "Deploying WEB_IMAGE=$WEB_IMAGE"
                  echo "Deploying DB_IMAGE=$DB_IMAGE"

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Pull deployment images
              run: |
                  docker pull "$WEB_IMAGE"
                  docker pull "$DB_IMAGE"
            - name: Pull deployment images
              run: |
                  docker pull "$WEB_IMAGE"
                  docker pull "$DB_IMAGE"

            - name: Stop existing deployment
              run: |
                  docker compose -f docker-compose.deploy.yml down || true

            - name: Create .env file from secrets
              run: |
                  cat > .env <<EOF
                  SECRET_KEY=${{ secrets.SECRET_KEY }}
                  DB_USER=${{ secrets.DB_USER }}
                  DB_PASSWORD=${{ secrets.DB_PASSWORD }}
                  API_KEY=${{ secrets.API_KEY }}
                  EOF

            - name: Start deployment
              env:
                  WEB_IMAGE: ${{ env.WEB_IMAGE }}
                  DB_IMAGE: ${{ env.DB_IMAGE }}
              run: |
                  docker compose -f docker-compose.deploy.yml up -d

            - name: Wait for application
              run: |
                  timeout=120
                  elapsed=0

                  until curl -fsk http://localhost:443/health > /dev/null; do
                      if [ "$elapsed" -ge "$timeout" ]; then
                          echo "Application did not become ready within ${timeout}s"
                          exit 1
                      fi

                    echo "Waiting for application..."
                    sleep 2
                    elapsed=$((elapsed+2))
                  done

                  echo "Application is ready"
                  echo "Application is ready"

            - name: Verify deployment health
              run: |
                  curl -f http://localhost:80/health

            - name: Promote deployed images to prod
              if: success() && github.event_name == 'workflow_dispatch'
              run: |
                  docker tag "$WEB_IMAGE" "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.WEB_IMAGE_NAME }}:prod"
                  docker tag "$DB_IMAGE" "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.DB_IMAGE_NAME }}:prod"

                  docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.WEB_IMAGE_NAME }}:prod"
                  docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.DB_IMAGE_NAME }}:prod"

            - name: Clean up .env
              if: always()
              run: rm -f .env

            - name: Show deployed container status on failure
              if: failure()
              run: |
                  docker compose -f docker-compose.deploy.yml ps

            - name: Show container logs on failure
              if: failure()
              run: |
                  docker compose -f docker-compose.deploy.yml logs
