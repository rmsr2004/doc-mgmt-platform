name: 1 - Continuous Integration
run-name: "${{ github.workflow }}"

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  WEB_IMAGE_NAME: secure-doc-platform-web
  DB_IMAGE_NAME: secure-doc-platform-db

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Start application stack for validation
        run: |
          docker compose up -d --build

      - name: Wait for application
        run: |
          timeout=60
          elapsed=0

          until curl -fs http://localhost:8000/health > /dev/null; do
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "Application did not become ready within ${timeout}s"
              exit 1
            fi

            echo "Waiting for application..."
            sleep 2
            elapsed=$((elapsed+2))
          done

          echo "Application is ready"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run smoke tests
        run: |
          pytest -q tests/test_smoke.py

      - name: Stop stack
        if: always()
        run: |
          docker compose down -v --remove-orphans

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase image namespace
        run: |
          echo "IMAGE_NAMESPACE_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        run: |
          echo "WEB_SHA_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"
          echo "DB_SHA_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.DB_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: ./web
          push: true
          tags: |
            ${{ env.WEB_SHA_TAG }}
          provenance: false

      - name: Build and push db image
        uses: docker/build-push-action@v7
        with:
          context: ./db
          push: true
          tags: |
            ${{ env.DB_SHA_TAG }}
          provenance: false