name: 1 - Continuous Integration
run-name: "${{ github.workflow }}"

on:
    pull_request:
        branches: [ ci-cd-test ]

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Start application stack for validation
              run: |
                  docker compose up -d --build

            - name: Wait for application
              run: |
                  timeout=60
                  elapsed=0

                  until curl -fsk https://localhost:443/health > /dev/null; do
                    if [ "$elapsed" -ge "$timeout" ]; then
                      echo "Application did not become ready within ${timeout}s"
                      exit 1
                    fi

                    echo "Waiting for application..."
                    sleep 2
                    elapsed=$((elapsed+2))
                  done

                  HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/health)
                  if [ "$HTTP_STATUS" != "301" ] && [ "$HTTP_STATUS" != "308" ]; then
                    echo "Expected HTTP redirect, got ${HTTP_STATUS}"
                    exit 1
                  fi

                  echo "Application is ready"

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Install test dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install pytest requests

            - name: Run smoke tests
              run: |
                  pytest -q tests/test_smoke.py

            - name: Stop stack
              if: always()
              run: |
                  docker compose down -v --remove-orphans
