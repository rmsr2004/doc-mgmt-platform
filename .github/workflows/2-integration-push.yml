name: 2 - Continuous Integration - Push
run-name: "${{ github.workflow }}"

on:
    push:
        branches: [ staging ]

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAMESPACE: ${{ github.repository_owner }}
    WEB_IMAGE_NAME: secure-doc-platform-web
    DB_IMAGE_NAME: secure-doc-platform-db

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set lowercase image namespace
              run: |
                  echo "IMAGE_NAMESPACE_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set image tags
              run: |
                  echo "WEB_SHA_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"
                  echo "DB_SHA_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.DB_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build and push web image
              uses: docker/build-push-action@v7
              with:
                  context: ./web
                  push: true
                  tags: ${{ env.WEB_SHA_TAG }}
                  provenance: false

            - name: Build and push db image
              uses: docker/build-push-action@v7
              with:
                  context: ./db
                  push: true
                  tags: ${{ env.DB_SHA_TAG }}
                  provenance: false
