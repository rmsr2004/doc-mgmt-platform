worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate Limit Zones
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

    resolver 127.0.0.11 valid=10s; # Use Docker's internal DNS

    client_max_body_size 10M;
    server_tokens off;

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3; 
        ssl_ciphers HIGH:!aNULL:!MD5 ;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Authentication Endpoints Rate Limiting
        location /login {
            limit_req zone=login_limit burst=100 nodelay;
            limit_req_status 429;

            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Upload Endpoint Rate Limiting
        location /documents/upload {
            limit_req zone=upload_limit burst=2 nodelay;
            limit_req_status 429;

            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        error_page 413 = @too_large_error;
        location @too_large_error {
            return 302 /documents/upload?error=too_large;
        }   

        error_page 429 = @rate_limit_error;
        location @rate_limit_error {
            default_type text/html;
            return 429 '<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Too Many Requests</title></head><body><p>Too many requests. Please wait a moment and <a href="/login">try again</a>.</p></body></html>';
        }
    }
}