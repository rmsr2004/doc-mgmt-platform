services:
  nginx-web:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    volumes:
      - ./web/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/nginx/certs:/etc/nginx/certs:ro
    networks:
      - public
      - private_flask
    
  web:
    build: ./web
    environment:
      - AUDIT_LOG_DIR=/var/log/docmgmtplatform
      - FLASK_DEBUG=true
    volumes:
      - audit_logs:/var/log/docmgmtplatform
      - ./web/app:/app/app
      - ./web/static:/app/static
      - ./web/templates:/app/templates
    depends_on:
      - db
    networks:
      - private_flask
      - private_db

  db:
    build: ./db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - private_db

volumes:
  pgdata:
  audit_logs:

networks:
  public:
    driver: bridge
  
  private_flask:
    driver: bridge
    internal: true

  private_db:
    driver: bridge
    internal: true
