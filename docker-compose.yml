services:
  nginx-web:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    volumes:
      - ./web/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/nginx/certs:/etc/nginx/certs:ro
    networks:
      - public
      - private_flask
    
  web:
    build: ./web
    volumes:
      - audit_logs:/var/log/docmgmtplatform
      - ./web:/app
    depends_on:
      - db
    networks:
      - private_flask
      - private_db
    cap_add:
      - NET_ADMIn

  db:
    build: ./db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - private_db
    cap_add:
      - NET_ADMIN

volumes:
  pgdata:
  audit_logs:

networks:
  public:
    driver: bridge
  
  private_flask:
    driver: bridge
    internal: true

  private_db:
    driver: bridge
    internal: true
