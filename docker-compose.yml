services:
  nginx-web:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/nginx/certs:/etc/nginx/certs:ro
  
  web:
    build: ./web
    volumes:
      - ./web:/app
    depends_on:
      - db

  db:
    build: ./db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
